<div class="dashboard-entreprise">
    <nav class="navbar navbar-dark bg-dark px-4 mb-4 shadow">
      <span class="navbar-brand fw-bold">Espace Recruteur : {{ entrepriseNom }}</span>
      <button class="btn btn-outline-light btn-sm" (click)="logout()">Déconnexion</button>
    </nav>
  
    <div class="container-fluid px-4">
      <div class="row g-4">
        
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm">
            <div class="card-header bg-white py-3">
              <h5 class="mb-0 fw-bold text-primary">📩 Candidatures récentes</h5>
            </div>
            <div class="card-body">
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead class="table-light">
                    <tr>
                      <th>Candidat</th>
                      <th>Poste visé</th>
                      <th>Matching</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    @for (candidat of candidatsPostules; track candidat.nom) {
                      <tr>
                        <td>
                          <div class="fw-bold">{{ candidat.nom }}</div>
                          <small class="text-muted">Reçu {{ candidat.date }}</small>
                        </td>
                        <td>{{ candidat.poste }}</td>
                        <td><span class="badge bg-success">{{ candidat.score }}</span></td>
                        <td>
                          <button class="btn btn-sm btn-primary me-2" (click)="telechargerCV(candidat.nom)">CV</button>
                          <button class="btn btn-sm btn-outline-dark">Contacter</button>
                        </td>
                      </tr>
                    }
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
  
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-primary text-white py-3">
              <h5 class="mb-0 fw-bold">🕒 Entretiens du jour</h5>
            </div>
            <div class="card-body p-0">
              <ul class="list-group list-group-flush">
              <!--  @for (rdv of rendezVous; track rdv.candidat) {
                  <li class="list-group-item p-3">
                    <div class="d-flex justify-content-between align-items-center">
                      <div>
                        <span class="badge bg-light text-dark me-2">{{ rdv.heure }}</span>
                        <strong>{{ rdv.candidat }}</strong>
                      </div>
                      <small class="text-primary">{{ rdv.salle }}</small>
                    </div>
                  </li> 
                }-->
              </ul>
            </div>
          </div>
  
          <div class="card bg-info text-white border-0 shadow-sm">
            <div class="card-body text-center py-4">
              <h6>Besoin d'un nouveau talent ?</h6>
              <button class="btn btn-light mt-2 fw-bold" routerLink="/publier-offre">Publier une offre</button>
            </div>
          </div>
        </div>
  
      </div>
    </div>
  </div>
